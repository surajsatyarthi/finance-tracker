name: 🦅 Alpha Protocol - Quality Gates

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔐 Validate environment (development)
        run: npm run validate:env
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: 🧹 Lint
        run: npm run lint

      - name: 🔍 Type check
        run: npm run typecheck

      - name: 🔨 Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: 🧪 Run tests
        run: npm run test

      - name: 🔍 Security scan (placeholder)
        run: npm run ralph:scan

      - name: ✅ All gates passed
        if: success()
        run: |
          echo "🎉 All Alpha Protocol quality gates passed!"
          echo "✅ Environment validated"
          echo "✅ Code quality verified"
          echo "✅ Build successful"
          echo "✅ Tests passed"

  # Production deployment gate (only on main/master)
  production-gate:
    name: Production Deployment Gate
    runs-on: ubuntu-latest
    needs: quality-gates
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔐 Validate production environment
        run: npm run validate:env:production
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: ✅ Production gate passed
        run: |
          echo "🚀 Ready for production deployment!"
          echo "✅ Production environment validated"
