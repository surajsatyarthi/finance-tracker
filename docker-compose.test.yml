version: '3.8'

services:
  # Supabase PostgreSQL Database for Testing
  postgres:
    image: supabase/postgres:15.1.1.41
    container_name: finance-tracker-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_tracker_test
    ports:
      - "54322:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Supabase Studio for Test Database Management (optional)
  studio:
    image: supabase/studio:20240729-ce3506b
    container_name: finance-tracker-test-studio
    environment:
      SUPABASE_URL: http://kong:8000
      STUDIO_PG_META_URL: http://meta:8080
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6d291ZXN1ZWFkb3FybG10ZXloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg0MTY5NDYsImV4cCI6MjA3Mzk5Mjk0Nn0.Yj8lndB0gurd5b2Q8mtDT0ICMVbFq2JqLJl1kVfHNlA
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6d291ZXN1ZWFkb3FybG10ZXloIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc1ODQxNjk0NiwiZXhwIjoyMDczOTkyOTQ2fQ.SERVICE_ROLE_KEY_HERE
    ports:
      - "54323:3000"
    depends_on:
      - postgres

  # Finance Tracker App for E2E Testing
  app:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: finance-tracker-test-app
    environment:
      NODE_ENV: test
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      PLAYWRIGHT_TEST_BASE_URL: http://localhost:3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres-data:
    driver: local
